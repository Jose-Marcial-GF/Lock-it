<div class="preview-card" [ngClass]="password.isPinned ? 'pinned' : 'unpinned'" [routerLink]="['/password-detail', password.id]">

  <div class="left-section">
    <div class="icon-placeholder">
      <img *ngIf="password.iconUrl" [src]="password.iconUrl" class="password-icon" alt="">
      <ion-icon *ngIf="!password.iconUrl" name="lock-closed-outline"></ion-icon>
    </div>
    <span class="password-name">{{ password.name }}</span>
  </div>

  <div class="right-section">

    <ion-button *ngIf="!isMobile" fill="clear" class="copy-btn" (click)="copyToClipboard(); $event.stopPropagation()">
      <ion-icon [name]="copied ? 'checkmark-outline' : 'clipboard-outline'"></ion-icon>
    </ion-button>

    <div *ngIf="isMobile" (click)="$event.stopPropagation()">
      <app-lock-passwd
        [isPinned]="password.isPinned ?? false"
        (togglePin)="pinToggle.emit(password.id)">
      </app-lock-passwd>
    </div>

  </div>

</div>
