<div class="list-container p-20">
  <ng-container *ngIf="passwords.length > 0; else emptyState">
    <app-password-preview
      *ngFor="let pwd of passwords"
      [password]="pwd"
      (pinToggle)="handlePinToggle($event)">
    </app-password-preview>
  </ng-container>

  <ng-template #emptyState>
    <div class="text-center p-20">
      <p class="text-italic" style="color: var(--label-gray);">
        No tienes ninguna contraseña guardada
      </p>
    </div>
  </ng-template>
</div>
